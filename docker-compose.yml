services:
  ocr-api:
    build: ./ocr-api
    restart: unless-stopped
    ports:
      - "192.168.176.224:2480:8000"
    volumes:
      - ./ocr-api/output:/ocr-api/output
      - /etc/localtime:/etc/localtime:ro
      - ${RCLONE_CONFIG_PATH:-/root/.config/rclone/rclone.conf}:/ocr-api/.config/rclone/rclone.conf:ro
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 120s
      timeout: 20s
      retries: 3
      start_period: 15s
